{% extends 'base.html' %}
{% block title %}GarageTool | Add Service{% endblock %}
{% load static %}
{% block content %}
    <div class="form-style">
        <h1>Add service</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="add-button" type="submit">Add to services list</button>
            <a href="{% url 'catalogue:services_list' %}" class="cancel-button">Cancel</a>
        </form>
    </div>
{% endblock %}
