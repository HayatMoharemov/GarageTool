{% extends 'base.html' %}
{% load static %}
{% block title %}GarageTool | Services Catalogue{% endblock %}
{% block content %}
    <div class="titillium-font">
        <h1>Details</h1>
    </div>
    <div class="vehicle-card-details titillium-font">
        <p>{{ object.title }}</p>
        <p>{{ object.price }}$</p>
        <p>
            {% if object.description %}
                {{ object.description }}
            {% else %}
                No description
            {% endif %}
        </p>
        <a class="edit-button" href="{% url 'catalogue:parts_list' %}" >Go back</a>
    </div>
{% endblock %}
