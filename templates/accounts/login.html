{% extends 'base.html' %}
{% block title %}GarageTool | Login {% endblock %}
{% block content %}
    <div class="form-style">
        <form method="post">
            {% csrf_token %}
            
            <p>Email:</p>{{ form.username }}
            
            <p>Password:</p>{{ form.password }}

            <button type="submit">Log in</button>
        </form>
    </div>
    <div class="information">
        <p>You don't have an account yet? <a href="{% url 'accounts:register' %}">Register</a> now!</p>
    </div>
{% endblock %}
